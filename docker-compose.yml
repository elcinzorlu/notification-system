services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification_secret
      POSTGRES_DB: notification_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    container_name: notification-api
    ports:
      - "8081:8080"
    environment:
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: notification
      DB_PASSWORD: notification_secret
      DB_NAME: notification_system
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      WEBHOOK_URL: https://webhook.site/a2d24e8e-0d36-417d-bc4d-74fe82398181
      RATE_LIMIT_PER_SECOND: "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    container_name: notification-worker
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: notification
      DB_PASSWORD: notification_secret
      DB_NAME: notification_system
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      WEBHOOK_URL: https://webhook.site/a2d24e8e-0d36-417d-bc4d-74fe82398181
      RATE_LIMIT_PER_SECOND: "100"
      WORKER_CONCURRENCY: "10"
      WORKER_MAX_RETRIES: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
